name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck API
        run: bun run --cwd api typecheck

      - name: Typecheck web
        run: bun run --cwd web typecheck

      - name: Build web
        run: bun run --cwd web build

      # Boots the API against a throwaway Postgres service container and
      # hits /health, so CI catches a broken server start (bad import,
      # missing env handling, etc.) before it ever reaches Vercel.
      - name: Smoke test API boot
        run: |
          bun run --cwd api src/index.ts &
          API_PID=$!
          sleep 2
          curl -sf http://localhost:3001/health
          kill $API_PID
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

  # Separate job (not steps in typecheck-and-build) so it runs in
  # parallel — E2E needs both dev servers plus a browser, meaningfully
  # heavier than the fast typecheck/lint/unit-test feedback loop above.
  # Own throwaway Postgres, migrated fresh, entirely disposed of at the
  # end of the job — never runs against the sandbox's real database.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: web
        run: bunx playwright install --with-deps chromium

      - name: Apply database migration
        run: psql "$DATABASE_URL" -f api/supabase/migrations/0001_applications.sql
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

      - name: Start API and web dev servers
        run: |
          bun run --cwd api src/index.ts > api.log 2>&1 &
          bun run --cwd web dev > web.log 2>&1 &

          echo "Waiting for API..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/health && break
            sleep 1
          done
          curl -sf http://localhost:3001/health > /dev/null || {
            echo "API never became healthy; last output:"
            cat api.log
            exit 1
          }

          echo "Waiting for web..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173 && break
            sleep 1
          done
          curl -sf http://localhost:5173 > /dev/null || {
            echo "Web server never became healthy; last output:"
            cat web.log
            exit 1
          }
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
          WEB_ORIGIN: http://localhost:5173

      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dev-server-logs
          path: |
            api.log
            web.log
          retention-days: 7

      - name: Run Playwright E2E tests
        run: bun run --cwd web test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
