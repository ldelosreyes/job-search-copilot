name: Reset sandbox

# Nightly cron keeps the public demo's data looking like the curated
# story (api/scripts/seed.ts) instead of drifting as visitors create/
# edit/delete applications. workflow_dispatch lets this be triggered
# manually to verify it without waiting for the schedule.
on:
  schedule:
    - cron: "0 16 * * *" # 16:00 UTC = 00:00 AWST (no DST, so this stays fixed)
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    environment: sandbox
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Reset sandbox data
        run: bun run --cwd api seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ALLOW_SEED_RESET: "true"
